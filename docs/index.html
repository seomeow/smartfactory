<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트공장 사업공고 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f4f6f9;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a4fa0, #2d7dd2);
      color: white;
      padding: 28px 40px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .stats {
      display: flex;
      gap: 16px;
      padding: 24px 40px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }

    .stat-card {
      background: #f8faff;
      border: 1px solid #d0dff5;
      border-radius: 10px;
      padding: 14px 24px;
      text-align: center;
      min-width: 120px;
    }

    .stat-card .num {
      font-size: 2rem;
      font-weight: 800;
      color: #1a4fa0;
    }

    .stat-card .label {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
    }

    .toolbar {
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar input {
      padding: 8px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 260px;
    }

    .toolbar select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      background: white;
    }

    .container { padding: 0 40px 40px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    thead {
      background: #1a4fa0;
      color: white;
    }

    thead th {
      padding: 14px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #f5f8ff; }

    td {
      padding: 14px 16px;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    td.num {
      color: #999;
      width: 50px;
      text-align: center;
    }

    td.title a {
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 500;
      line-height: 1.5;
    }

    td.title a:hover { color: #1a4fa0; text-decoration: underline; }

    td.period {
      color: #555;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.open   { background: #e6f7ee; color: #1a7a40; }
    .badge.soon   { background: #e8f0fe; color: #1a4fa0; }
    .badge.closed { background: #f0f0f0; color: #777; }
    .badge.etc    { background: #fafafa; color: #999; }

    .btn-detail {
      display: inline-block;
      padding: 5px 12px;
      background: #1a4fa0;
      color: white;
      border-radius: 5px;
      font-size: 0.78rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-detail:hover { background: #153d80; }

    td.empty {
      text-align: center;
      padding: 40px;
      color: #aaa;
    }

    .source-link {
      text-align: right;
      padding: 16px 40px;
      font-size: 0.8rem;
      color: #999;
    }

    .source-link a { color: #1a4fa0; }

    @media (max-width: 768px) {
      header, .stats, .toolbar, .container, .source-link {
        padding-left: 16px;
        padding-right: 16px;
      }
      .stats { flex-wrap: wrap; }
      thead th:nth-child(1),
      thead th:nth-child(4),
      td.num, td.period { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏭 스마트공장 사업공고 대시보드</h1>
  <p>smart-factory.kr 공식 사업공고를 자동 수집합니다 · 최종 업데이트: 2026-06-23 13:23</p>
</header>

<div class="stats">
  <div class="stat-card">
    <div class="num">0</div>
    <div class="label">전체 공고</div>
  </div>
  <div class="stat-card">
    <div class="num" style="color:#1a7a40">0</div>
    <div class="label">🟢 접수중</div>
  </div>
  <div class="stat-card">
    <div class="num" style="color:#2d7dd2">0</div>
    <div class="label">🔵 접수예정</div>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 공고명 검색..." oninput="filterTable()">
  <select id="statusFilter" onchange="filterTable()">
    <option value="">전체 상태</option>
    <option value="접수중">🟢 접수중</option>
    <option value="접수예정">🔵 접수예정</option>
    <option value="마감">⚫ 마감</option>
  </select>
</div>

<div class="container">
  <table id="mainTable">
    <thead>
      <tr>
        <th style="width:50px">No.</th>
        <th>공고명</th>
        <th style="width:120px">상태</th>
        <th style="width:200px">접수기간</th>
        <th style="width:90px">바로가기</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5" class="empty">현재 공고 데이터가 없습니다.</td></tr>
    </tbody>
  </table>
</div>

<div class="source-link">
  데이터 출처: <a href="https://www.smart-factory.kr/usr/bg/ba/ma/bsnsPblanc" target="_blank">smart-factory.kr 사업공고</a>
</div>

<script>
function filterTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const rows = document.querySelectorAll('#tableBody tr');

  rows.forEach(row => {
    const title = row.querySelector('.title')?.textContent.toLowerCase() || '';
    const badge = row.querySelector('.badge')?.textContent || '';
    const matchSearch = !search || title.includes(search);
    const matchStatus = !status || badge.includes(status);
    row.style.display = (matchSearch && matchStatus) ? '' : 'none';
  });
}
</script>

</body>
</html>
