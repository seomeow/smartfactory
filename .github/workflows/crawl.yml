name: 스마트공장 공고 자동 수집

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 크롤링 실행
        run: python scripts/crawl.py

      - name: HTML 생성
        run: python scripts/build_html.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull origin main
          git stash pop
          git add data/ docs/
          git diff --staged --quiet || git commit -m "🔄 공고 업데이트: $(date '+%Y-%m-%d %H:%M') KST"
          git push origin main
